name: Deploy with Ansible 10.x

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'ansible>=10,<11'

      - name: Install Ansible collections (if requirements.yml exists)
        run: |
          if [ -f ansible-project/requirements.yml ]; then
            ansible-galaxy collection install -r ansible-project/requirements.yml
          fi

      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          if_key_missing: fail

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"   # Set to False if known_hosts is not provided
          ANSIBLE_TIMEOUT: "30"
        run: |
          ansible-playbook -i hosts ansible-project/deploy.yml -v